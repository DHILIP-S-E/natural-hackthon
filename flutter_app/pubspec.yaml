name: flutter_app
description: Flutter app with Riverpod + GoRouter architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  google_sign_in: ^6.3.0
  skeletonizer: ^2.1.3
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  # Firebase — uncomment after running: flutterfire configure --project=natural-c2bd1
  # firebase_core: ^3.6.0
  # firebase_storage: ^12.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
